name: WhatsApp Automated Schedule Sender

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

jobs:
  kirim_jadwal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Cache WhatsApp Session
        uses: actions/cache@v4
        id: restore-session
        with:
          path: auth_info_baileys
          key: ${{ runner.os }}-wa-session-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-wa-session-

      - name: Restore WhatsApp Session from Secrets (Fallback)
        run: |
          if [ -f "auth_info_baileys/creds.json" ]; then
            echo "✅ Session berhasil direstore dari Cache, melewati fallback ke Secrets."
            exit 0
          fi

          echo "⚠️ Cache tidak ditemukan, memuat dari Secrets..."
          cat << 'EOF' > secrets.json
          ${{ toJson(secrets) }}
          EOF

          # Ambil semua secret yang berawalan WA_AUTH_, urutkan berdasarkan angkanya,
          # lalu gabungkan isinya ke auth_base64.txt
          jq -r 'to_entries | map(select(.key | test("^WA_AUTH_\\d+$"))) | sort_by(.key | match("\\d+") | .string | tonumber) | .[].value' secrets.json > auth_base64.txt
          rm secrets.json

          mkdir -p auth_info_baileys
          cat auth_base64.txt | tr -d '\n\r ' | base64 -d > auth.zip
          unzip -o auth.zip -d auth_info_baileys/
          rm auth.zip auth_base64.txt

      - name: Restore Jadwal Excel
        run: |
          echo "${{ secrets.JADWAL_EXCEL_B64 }}" | tr -d '\n\r ' | base64 -d > jadwal.xlsx

      - name: Run Jadwal Sender
        env:
          GROUP_ID_ASRAMA: ${{ secrets.GROUP_ID_ASRAMA }}
          GROUP_ID_SQUAD: ${{ secrets.GROUP_ID_SQUAD }}
          TZ: "Asia/Jakarta"

        run: node kirim_jadwal.js --test
