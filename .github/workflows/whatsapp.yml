name: WhatsApp Automated Schedule Sender

on:
  schedule:
    # Jalan setiap hari jam 20:00 WIB (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  kirim_jadwal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Restore WhatsApp Session from Secrets
        env:
          # Kita masukkan GitHub secrets berawalan WA_AUTH_ agar terbaca Node/Bash
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
        run: |
          # Ambil semua secret yang berawalan WA_AUTH_, urutkan berdasarkan angkanya,
          # lalu gabungkan isinya ke auth_base64.txt
          echo "$SECRETS_CONTEXT" | jq -r 'to_entries | map(select(.key | test("^WA_AUTH_\\d+$"))) | sort_by(.key | match("\\d+") | .string | tonumber) | .[].value' > auth_base64.txt

          mkdir -p auth_info_baileys
          cat auth_base64.txt | tr -d '\n\r ' | base64 -d > auth.zip
          unzip auth.zip -d auth_info_baileys/
          rm auth.zip auth_base64.txt

      - name: Restore Jadwal Excel
        run: |
          echo "${{ secrets.JADWAL_EXCEL_B64 }}" | tr -d '\n\r ' | base64 -d > jadwal.xlsx

      - name: Run Jadwal Sender
        env:
          GROUP_ID_ASRAMA: ${{ secrets.GROUP_ID_ASRAMA }}
          GROUP_ID_SQUAD: ${{ secrets.GROUP_ID_SQUAD }}
          TZ: "Asia/Jakarta"

        run: node kirim_jadwal.js --test
