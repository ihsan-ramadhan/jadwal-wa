name: WhatsApp Automated Schedule Sender

on:
  schedule:
    # Jalan setiap hari jam 20:00 WIB (13:00 UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  kirim_jadwal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Restore WhatsApp Session from 7 Secrets
        run: |
          echo "${{ secrets.WA_AUTH_1 }}" > auth_base64.txt
          echo "${{ secrets.WA_AUTH_2 }}" >> auth_base64.txt
          echo "${{ secrets.WA_AUTH_3 }}" >> auth_base64.txt
          echo "${{ secrets.WA_AUTH_4 }}" >> auth_base64.txt
          echo "${{ secrets.WA_AUTH_5 }}" >> auth_base64.txt
          echo "${{ secrets.WA_AUTH_6 }}" >> auth_base64.txt
          echo "${{ secrets.WA_AUTH_7 }}" >> auth_base64.txt

          mkdir -p auth_info_baileys
          cat auth_base64.txt | tr -d '\n\r ' | base64 -d > auth.zip
          unzip auth.zip -d auth_info_baileys/
          rm auth.zip auth_base64.txt

      - name: Run Jadwal Sender
        env:
          GROUP_ID_ASRAMA: ${{ secrets.GROUP_ID_ASRAMA }}
          GROUP_ID_SQUAD: ${{ secrets.GROUP_ID_SQUAD }}

        run: node kirim_jadwal.js --test
